components:
  terraform:
    frontend-site:
      metadata:
        component: frontend-site
      vars:
        dns:
          certificate:
            create: false
        access:
          mode: public
          basic_auth:
            create_edge_lambda: false
            create_ssm_parameter: false
            ssm_placeholder_value: REPLACE_ME_DO_NOT_USE
            realm: Restricted
            credential_cache_seconds: 300
        deployment:
          github:
            repository: Mintograde/halospawns-svelte
            branch: main
            oidc:
              create_provider: false
        cloudfront:
          price_class: PriceClass_100
