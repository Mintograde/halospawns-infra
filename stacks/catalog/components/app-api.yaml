components:
  terraform:
    app-api:
      metadata:
        component: app-api
      vars:
        domain:
          create_certificate: true
          create_dns_records: true
        supabase:
          jwt:
            audience: authenticated
            create_authorizer: true
        uploads:
          maps:
            upload_prefix: maps/unprocessed
            asset_read_prefix: maps/processed
            support_resource_prefix: maps/support-resources
            support_resource_auto_approve: false
          replays:
            upload_prefix: replays/unprocessed
            asset_read_prefix: replays/processed
            heatmap_rollup_artifact_prefix: replays/derived/heatmap-rollups
          url_ttl_seconds: 900
        rendering:
          output_prefix_template: maps/processed/{upload_id}/screenshots/v1/
          screenshot_ingest_path: /v1/ingest/map-screenshots
          render_set:
            name: default-map-screenshots
            version: 1
        release:
          artifact_prefix: releases/
          lambda:
            runtime: python3.12
            handler: halospawns_api.lambda_handler.handler
            memory_mb: 512
            timeout_seconds: 30
            alias_name: live
          github:
            repository: Mintograde/halospawns-api
            branch: main
            oidc:
              create_provider: false
              thumbprint_list:
                - 6938fd4d98bab03faadb97b34396831e3780aea1
