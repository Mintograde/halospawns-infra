components:
  terraform:
    app-api:
      metadata:
        component: app-api
      vars:
        artifact_release_prefix: releases/
        github_repository: Mintograde/halospawns-api
        github_branch: main
        app_lambda_runtime: python3.12
        app_lambda_handler: halospawns_api.lambda_handler.handler
        supabase_jwt_audience: authenticated
        map_upload_prefix: maps/unprocessed
        replay_upload_prefix: replays/unprocessed
        map_asset_read_prefix: maps/processed
        replay_asset_read_prefix: replays/processed
        map_support_resource_prefix: maps/support-resources
        upload_url_ttl_seconds: 900
