components:
  terraform:
    map-processing:
      metadata:
        component: map-processing
      vars:
        callbacks:
          clients:
            heatmaps: heatmap-processing
            maps: map-processing
            replays: replay-processing
            renderer: map-rendering
          paths:
            processing_status_template: /v1/uploads/{upload_id}/processing-status
            replay_finalization: /v1/ingest/replay-uploads
            replay_reprocess_status_template: /v1/ingest/replay-reprocess-attempts/{attempt_id}/status
            map_finalization: /v1/ingest/map-uploads
            map_support_resource_ingest: /v1/ingest/map-support-resources
            map_support_resource_resolve: /v1/ingest/map-support-resources/resolve
            map_screenshot_ingest: /v1/ingest/map-screenshots
            heatmap_rollup_claim: /v1/ingest/heatmap-rollups/claim
            heatmap_rollup_inputs_template: /v1/ingest/heatmap-rollups/{scope_id}/inputs
            heatmap_rollup_complete_template: /v1/ingest/heatmap-rollups/{scope_id}/complete
            heatmap_rollup_failed_template: /v1/ingest/heatmap-rollups/{scope_id}/failed
        storage:
          maps:
            unprocessed: maps/unprocessed
            processed: maps/processed
            failed: maps/failed
            support_resources: maps/support-resources
          replays:
            spatial_artifacts: replays/derived/spatial
            heatmap_rollups: replays/derived/heatmap-rollups
            region_stat_rollups: replays/derived/region-stat-rollups
        native_maps:
          runtime: python3.14
          handler: halo_map.lambda_handler.handler
          alias_name: live
          lambda:
            timeout_seconds: 900
            memory_mb: 2048
            ephemeral_storage_mb: 10240
          event_source:
            enabled: false
            batch_size: 1
            report_batch_item_failures: true
          enqueue_render_jobs: false
        replay_parser:
          enabled: true
          repository_name: halospawns-replay-parser
          timeout_seconds: 300
          memory_mb: 2048
          ephemeral_storage_mb: 10240
          batch_size: 1
          report_batch_item_failures: true
          event_source_enabled: true
          environment_variables:
            REPLAY_EXTRACTOR_MODE: native_with_fallback
            SPATIAL_OCCUPANCY_CELL_SIZE: "0.5"
        heatmap_rollup_worker:
          enabled: true
          runtime: python3.14
          handler: handler.lambda_handler
          alias_name: live
          lambda:
            timeout_seconds: 840
            memory_mb: 3008
            ephemeral_storage_mb: 2048
            reserved_concurrent_executions: 1
          schedule:
            expression: rate(5 minutes)
            maximum_event_age_seconds: 3600
            maximum_retry_attempts: 2
          processing:
            input_page_limit: 100
            max_scopes_per_invocation: 4
            retry_after_seconds: 300
          region_stats:
            enabled: true
            max_membership_checks: 5000000
          dlq:
            message_retention_seconds: 1209600
          alarms:
            enabled: true
            error_evaluation_periods: 1
            duration_threshold_ms: 780000
        renderer:
          runtime: nodejs24.x
          handler: packages/viewer-renderer/src/lambda/handler.handler
          alias_name: live
          lambda:
            timeout_seconds: 300
            memory_mb: 2048
            ephemeral_storage_mb: 2048
          event_source:
            enabled: false
            batch_size: 1
            report_batch_item_failures: true
          queue:
            visibility_timeout_seconds: 360
            message_retention_seconds: 604800
            receive_wait_time_seconds: 20
            max_receive_count: 4
          render_set:
            name: default-map-screenshots
            version: 1
        release:
          oidc:
            create_provider: false
            thumbprint_list:
              - 6938fd4d98bab03faadb97b34396831e3780aea1
          maps:
            artifact_prefix: releases/
            github:
              repository: Mintograde/halospawns-maps
              branch: main
          renderer:
            artifact_prefix: renderer/releases/
            github:
              repository: Mintograde/halospawns-svelte
              branch: main
