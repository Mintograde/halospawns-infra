import:
  - _defaults
  - catalog/components/tfstate-backend
  - catalog/components/frontend-site
  - catalog/components/app-api
  - catalog/components/uploads-ingest
  - catalog/components/ecr
  - catalog/components/map-processing

vars:
  environment: dev
  profile: halospawns-dev

terraform:
  backend:
    s3:
      bucket: halospawns-tfstate-283279960672

components:
  terraform:
    frontend-site:
      vars:
        dns:
          domain_name: dev.halospawns.com
          hosted_zone:
            create: true
            name: dev.halospawns.com
          certificate:
            create: true
        access:
          mode: basic_auth
          basic_auth:
            create_edge_lambda: true
            ssm_parameter_name: /halospawns/dev/frontend-site/basic-auth/credentials-base64
            create_ssm_parameter: true
            realm: Halospawns dev
        deployment:
          github:
            environment: dev
            oidc:
              create_provider: true
    app-api:
      vars:
        enabled: true
        dependencies:
          state_bucket: halospawns-tfstate-283279960672
          state_keys:
            frontend_site: dev/frontend-site/terraform.tfstate
            uploads_ingest: dev/uploads-ingest/terraform.tfstate
          queues:
            map_rendering: map-rendering-queue
            map_rendering_dlq: map-rendering-dlq
            map_rendering_age_threshold_seconds: 300
            replay_processing: replays-processing-queue
        domain:
          name: api.dev.halospawns.com
          base_url: https://api.dev.halospawns.com
        cors:
          allowed_origins:
            - https://dev.halospawns.com
            - http://127.0.0.1:5173
            - http://127.0.0.1:5174
            - http://127.0.0.1:5175
            - http://127.0.0.1:5176
            - http://127.0.0.1:5177
            - http://127.0.0.1:5178
            - http://127.0.0.1:5179
            - http://127.0.0.1:5180
        supabase:
          project_ref: sozzcczmuwlacqczdmnm
          url: https://sozzcczmuwlacqczdmnm.supabase.co
          jwt:
            issuer: https://sozzcczmuwlacqczdmnm.supabase.co/auth/v1
          secrets:
            database_url_name: /halospawns/dev/app-api/supabase/database-url
            service_role_name: /halospawns/dev/app-api/supabase/service-role-key
            create_service_role_secret: false
        uploads:
          maps:
            support_resource_auto_approve: true
        release:
          github:
            environment: dev
        observability:
          enabled: true
          additional_alarm_names:
            - halospawns-dev-heatmap-rollup-dlq
            - halospawns-dev-heatmap-rollup-duration
            - halospawns-dev-heatmap-rollup-errors
            - halospawns-dev-heatmap-rollup-scope-failures
            - halospawns-dev-map-rendering-dlq-depth
            - halospawns-dev-map-rendering-queue-age
          alert_subscriptions: {}
        trusted_services:
          secret_names:
            heatmap-processing: /halospawns/dev/app-api/trusted-clients/heatmap-processing/hmac-secret
            live-relay: /halospawns/dev/app-api/trusted-clients/live-relay/hmac-secret
            map-processing: /halospawns/dev/app-api/trusted-clients/map-processing/hmac-secret
            map-rendering: /halospawns/dev/app-api/trusted-clients/map-rendering/hmac-secret
            replay-processing: /halospawns/dev/app-api/trusted-clients/replay-processing/hmac-secret
          timestamp_tolerance_seconds: 300
    uploads-ingest:
      vars:
        observability:
          enabled: true
        storage:
          allowed_cors_origins:
            - https://dev.halospawns.com
            - http://127.0.0.1:5173
            - http://127.0.0.1:5174
            - http://127.0.0.1:5175
            - http://127.0.0.1:5176
            - http://127.0.0.1:5177
            - http://127.0.0.1:5178
            - http://127.0.0.1:5179
            - http://127.0.0.1:5180
    map-processing:
      vars:
        dependencies:
          state_bucket: halospawns-tfstate-283279960672
          state_keys:
            ecr: dev/ecr/terraform.tfstate
            uploads_ingest: dev/uploads-ingest/terraform.tfstate
            app_api: dev/app-api/terraform.tfstate
        native_maps:
          event_source:
            enabled: true
          enqueue_render_jobs: true
        renderer:
          event_source:
            enabled: true
          alarms:
            enabled: true
            queue_age_threshold_seconds: 300
        release:
          maps:
            github:
              environment: dev
          renderer:
            github:
              environment: dev
